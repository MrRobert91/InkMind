services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inkmind
      POSTGRES_PASSWORD: inkmind
      POSTGRES_DB: inkmind
    volumes:
      - inkmind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://inkmind:inkmind@db:5432/inkmind
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  inkmind_pgdata:
